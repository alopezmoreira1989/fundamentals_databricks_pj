name: Sync Databricks Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest into Databricks Repo
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          REPO_ID=4088793207541076

          # Obtain short-lived bearer token via OAuth M2M (client_credentials)
          RESP=$(curl -s -X POST "${DATABRICKS_HOST}/oidc/v1/token" \
            -d "grant_type=client_credentials&client_id=${DATABRICKS_CLIENT_ID}&client_secret=${DATABRICKS_CLIENT_SECRET}&scope=all-apis")
          TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')

          if [ -z "$TOKEN" ]; then
            echo "::error::OAuth token exchange failed: $RESP"
            exit 1
          fi

          echo "Updating repo id=${REPO_ID} to branch main..."
          RESULT=$(curl -s -w "\n%{http_code}" -X PATCH "${DATABRICKS_HOST}/api/2.0/repos/${REPO_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}')
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | sed '$d')

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Repo update failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

          echo "$BODY" | jq .
          echo "::notice::Databricks workspace synced to main"
