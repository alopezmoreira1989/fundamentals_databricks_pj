name: CI

# Quality gate for the repo: the pure-Python pipeline suite, the Django web suite (pytest +
# mypy), and ruff lint. Runs on PRs to main and on pushes to the integration branches.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev_alm]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pipeline-tests:
    name: pipeline tests (fundamentals_pipeline + streamlit lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies (installs fundamentals_pipeline via -e .)
        run: pip install -r requirements-dev.txt
      # Only the root suite; web/tests need Django settings and run in the web job. Streamlit
      # fixture-backed tests self-skip when the gitignored fixtures are absent.
      - name: Run pytest
        run: pytest tests -q

  web:
    name: web tests + mypy (Django)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install web dependencies (+ fundamentals_pipeline via -e .)
        run: |
          pip install -e .
          pip install -r web/requirements/dev.txt
      # Fetch the published Release artifacts as the offline test fixtures (they're gitignored,
      # so absent in a fresh checkout). The read-model tests point ARTIFACTS_LOCAL_DIR here and
      # otherwise self-skip — which would drop coverage below the floor. This is the same
      # `latest` Release the live app reads, so a 404 here means a real publish outage.
      - name: Fetch published artifacts as test fixtures
        run: |
          dir="fundamentals_pipeline/60__frontends/61__streamlit/fixtures"
          base="https://github.com/${{ github.repository }}/releases/download/latest"
          mkdir -p "$dir"
          # Mirror the local fixture set exactly: data + metrics + prices + meta, but NOT
          # backtest — test_infrastructure asserts the optional backtest artifact is absent
          # (graceful-degradation path), so fetching it would break that test.
          for f in dashboard_data.parquet dashboard_metrics.parquet dashboard_prices.parquet \
                   dashboard_meta.json; do
            curl -fsSL --retry 3 --retry-delay 2 "$base/$f" -o "$dir/$f"
          done
      - name: pytest + coverage floor (SQLite in-memory, config.settings.test)
        working-directory: web
        run: pytest -q --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=90
      - name: mypy + django-stubs
        working-directory: web
        run: mypy .

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.6"
      # Repo-wide: the NN__ Databricks notebook sources are now linted too (mechanical rules
      # fixed; cell-idiom rules ignored per-stage-dir in ruff.toml). See #167.
      - name: ruff check
        run: ruff check .
