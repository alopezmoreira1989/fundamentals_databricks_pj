<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fundamentals{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .watchlist-picker > summary { cursor: pointer; }
    .watchlist-picker > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">Fundamentals</a>
      <div class="navbar-nav flex-row align-items-center gap-3">
        <a class="nav-link" href="{% url 'screener:screen' %}">Screener</a>
        {% if user.is_authenticated %}
          <a class="nav-link" href="{% url 'watchlists:overview' %}">Watchlists</a>
          <a class="nav-link" href="{% url 'favorites:list' %}">Favorites</a>
          <a class="nav-link" href="{% url 'history:list' %}">History</a>
          <span class="navbar-text">{{ user.username }}</span>
          <form method="post" action="{% url 'users:logout' %}" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-light">Log out</button>
          </form>
        {% else %}
          <a class="nav-link" href="{% url 'users:login' %}">Log in</a>
          <a class="nav-link" href="{% url 'users:signup' %}">Sign up</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-5">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
