; Static type checking for the web (Django) layer. Run from web/:  mypy .
; django-stubs resolves model/manager/queryset types via the plugin below.
[mypy]
python_version = 3.12
plugins = mypy_django_plugin.main, mypy_drf_plugin.main
mypy_path = .
namespace_packages = True
explicit_package_bases = True

; Enforced on new Django code.
disallow_untyped_defs = True
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
warn_unused_configs = True

; Third-party libs without type info (queries go through our typed repositories anyway).
ignore_missing_imports = True

[mypy.plugins.django-stubs]
django_settings_module = config.settings.dev

; Django-generated migrations are not hand-written code — don't type-check them.
[mypy-*.migrations.*]
ignore_errors = True

; Tests may use loose typing (fixtures, pytest params).
[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False
warn_unused_ignores = False

; apps.users predates static typing (Users phase) — "from this phase onward" per the owner,
; so it is not retro-annotated. Relax the untyped-def gate and silence the known django-stubs
; friction on overriding the model's default `objects` manager. New code stays fully checked.
[mypy-apps.users.*]
disallow_untyped_defs = False
check_untyped_defs = False
disable_error_code = misc
