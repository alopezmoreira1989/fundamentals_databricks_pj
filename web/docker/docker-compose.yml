# Development stack. Run from the repo root:
#   docker compose -f web/docker/docker-compose.yml up --build
services:
  web:
    build:
      context: ../..                # repo root — lets the image install fundamentals_pipeline
      dockerfile: web/docker/Dockerfile
    environment:
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_URL: postgres://postgres:postgres@db:5432/fundamentals
    ports:
      - "8000:8000"
    volumes:
      - ../..:/app                  # live code reload in dev
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fundamentals
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
