# Isolates this Node project as its own pnpm root (the parent dir is a Python repo).
# Native deps that ship a build step must be explicitly approved on pnpm 11+
# (key: `allowBuilds`; the older `onlyBuiltDependencies` is deprecated), otherwise
# `pnpm install` aborts with ERR_PNPM_IGNORED_BUILDS. These are all trusted, prebuilt
# binaries: esbuild/workerd (Cloudflare adapter), sharp (Next image opt), unrs-resolver
# (ESLint import resolver).
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
